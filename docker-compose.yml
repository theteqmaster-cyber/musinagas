services:
  nginx:
    image: nginx:alpine
    container_name: musinagas_nginx
    ports:
      - "8080:80"
    volumes:
      - ./app/public:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    restart: unless-stopped

  php:
    build:
      context: ./docker
      dockerfile: Dockerfile
    container_name: musinagas_php
    volumes:
      - ./app:/var/www/html
    env_file:
      - .env
    restart: unless-stopped
